<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Night Diary</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: #000;
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 42px;
      font-weight: 200;
      letter-spacing: 8px;
      margin-bottom: 10px;
    }

    .date {
      color: #888;
      margin-bottom: 30px;
    }

    input, textarea {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      color: white;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
      outline: none;
      font-size: 15px;
    }

    textarea {
      min-height: 200px;
      resize: vertical;
      line-height: 1.8;
    }

    button {
      background: white;
      color: black;
      border: none;
      border-radius: 16px;
      padding: 14px 22px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .entry-title {
      font-size: 24px;
      margin-bottom: 8px;
      font-weight: 300;
    }

    .entry-date {
      color: #777;
      font-size: 12px;
      margin-bottom: 18px;
    }

    .entry-content {
      white-space: pre-wrap;
      line-height: 1.9;
      color: #ddd;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .delete-btn {
      background: transparent;
      color: #888;
      padding: 0;
    }

    .delete-btn:hover {
      color: #ff5a5a;
    }

    .login-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .hidden {
      display: none;
    }

    .center {
      text-align: center;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 30px;
        letter-spacing: 4px;
      }

      body {
        padding: 14px;
      }
    }
  </style>
</head>
<body>

<div id="loginPage" class="login-wrap">
  <div class="card" style="width:100%;max-width:380px;">
    <div class="center">
      <h1 style="font-size:34px;">NIGHT DIARY</h1>
      <p style="color:#888;margin-bottom:30px;">
        조용한 밤의 기록
      </p>
    </div>

    <input type="password" id="password" placeholder="비밀번호 입력">

    <button onclick="login()" style="width:100%;">
      들어가기
    </button>

    <p style="color:#666;font-size:12px;text-align:center;margin-top:16px;">
    </p>
  </div>
</div>

<div id="mainPage" class="hidden">
  <div class="container">

    <h1>NIGHT DIARY</h1>
    <div class="date" id="todayDate"></div>

    <div class="card">
      <input type="text" id="title" placeholder="오늘의 제목">

      <textarea id="content" placeholder="오늘의 감정을 천천히 적어보세요..."></textarea>

      <div style="text-align:right;">
        <button onclick="saveDiary()">저장하기</button>
      </div>
    </div>

    <div id="entries"></div>

  </div>
</div>

<script>
  const PASSWORD = "bn0302";

  function login() {
    const pw = document.getElementById('password').value;

    if (pw === PASSWORD) {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('mainPage').classList.remove('hidden');
    } else {
      alert('비밀번호가 틀렸습니다.');
    }
  }

  const today = new Date();
  document.getElementById('todayDate').innerText = today.toLocaleDateString('ko-KR', {
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    weekday: 'long'
  });

  function getEntries() {
    return JSON.parse(localStorage.getItem('night-diary') || '[]');
  }

  function saveEntries(entries) {
    localStorage.setItem('night-diary', JSON.stringify(entries));
  }

  function renderEntries() {
    const entries = getEntries();
    const wrap = document.getElementById('entries');

    wrap.innerHTML = '';

    if (entries.length === 0) {
      wrap.innerHTML = `
        <div class="card center" style="color:#666;">
          아직 작성된 일기가 없습니다.
        </div>
      `;
      return;
    }

    entries.forEach(entry => {
      const div = document.createElement('div');
      div.className = 'card';

      div.innerHTML = `
        <div class="top-row">
          <div>
            <div class="entry-title">${entry.title}</div>
            <div class="entry-date">${entry.date}</div>
          </div>

          <button class="delete-btn" onclick="deleteEntry(${entry.id})">
            삭제
          </button>
        </div>

        <div class="entry-content">${entry.content}</div>
      `;

      wrap.appendChild(div);
    });
  }

  function saveDiary() {
    const title = document.getElementById('title').value.trim();
    const content = document.getElementById('content').value.trim();

    if (!title || !content) {
      alert('제목과 내용을 입력해주세요.');
      return;
    }

    const entries = getEntries();

    entries.unshift({
      id: Date.now(),
      title,
      content,
      date: new Date().toLocaleString('ko-KR')
    });

    saveEntries(entries);

    document.getElementById('title').value = '';
    document.getElementById('content').value = '';

    renderEntries();
  }

  function deleteEntry(id) {
    const entries = getEntries().filter(entry => entry.id !== id);
    saveEntries(entries);
    renderEntries();
  }

  renderEntries();
</script>

</body>
</html>
